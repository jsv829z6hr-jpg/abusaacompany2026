<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>موقع شركة ابوصاع</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">
    <style>
        body { 
            background: url("images/background.png") no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Cairo', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        h1 {
            color: #000000;
            font-size: 80px;
            margin-top: 60px;
        }
        p {
            color: #000000;
            font-size: 40px;
            line-height: 1.8;
        }
        .logos {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .logos img {
            max-width: 100%;
            width: 200px;
            height: auto;
            background-color: #ffffff;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .logos img:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px #ffffff;
        }

        /* تصغير النصوص والشعارات على الهواتف */
        @media (max-width: 600px) {
            h1 {
                font-size: 40px;
            }
            p {
                font-size: 20px;
            }
            .logos {
                flex-direction: column;
                gap: 20px;
            }
            .logos img {
                width: 150px;
                padding: 10px;
            }
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>استفسار ذكي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #ffffff;
            font-family: 'Cairo', sans-serif;
            text-align: center;
            color: #000000;
            margin: 0;
            padding: 20px;
        }
        .logo {
            margin-top: 20px;
        }
        .logo img {
            width: 120px;
            height: auto;
        }
        h2 {
            color: #062174;
            font-size: 32px;
            margin: 20px 0;
        }
        textarea {
            width: 90%;
            max-width: 600px;
            height: 120px;
            font-size: 18px;
            margin: 20px auto;
            border-radius: 5px;
            padding: 10px;
            display: block;
        }
        button {
            background-color: #cf2626;
            color: #fff;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #062174;
        }
        #reply {
            margin-top: 30px;
            font-size: 20px;
            color: #062174;
        }
        .back-link {
            margin-top: 40px;
        }
        .back-link a {
            color: #062174;
            font-size: 18px;
            text-decoration: none;
        }
        .back-link a:hover {
            text-decoration: underline;
        }

        /* تصغير النصوص والعناصر على الهواتف */
        @media (max-width: 600px) {
            .logo img {
                width: 80px;
            }
            h2 {
                font-size: 24px;
            }
            textarea {
                width: 100%;
                height: 100px;
                font-size: 16px;
            }
            button {
                width: 100%;
                font-size: 16px;
                padding: 10px;
            }
            #reply {
                font-size: 18px;
            }
            .back-link a {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- شعار الشركة -->
    <div class="logo">
        <img src="images/hyundai-seeklogo.png" alt="شعار الشركة">
    </div>

    <h2>💡 استفسر عن الصنف المطلوب</h2>
    <textarea id="question" placeholder="اكتب استفسارك هنا..."></textarea><br>
    <button onclick="askAI()">إرسال</button>

    <div id="reply"></div>

    <!-- رابط للعودة إلى الصفحة الرئيسية -->
    <div class="back-link">
        <a href="index.html">⬅️ العودة إلى الصفحة الرئيسية</a>
    </div>

    <script>
        async function askAI() {
            const question = document.getElementById("question").value;
            const replyDiv = document.getElementById("reply");

            try {
                const response = await fetch("https://api-inference.huggingface.co/models/google/flan-t5-base", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization":"" // ضع مفتاح API هنا إذا عندك
                    },
                    body: JSON.stringify({ inputs: question })
                });

                const data = await response.json();
                if (data.error) {
                    replyDiv.innerHTML = "❌ خطأ: " + data.error;
                } else {
                    replyDiv.innerHTML = "🔹 إجابة ذكية: " + (data[0]?.generated_text || "لم تصل إجابة");
                }
            } catch (err) {
                replyDiv.innerHTML = "⚠️ حدث خطأ أثناء الاتصال بالخدمة.";
            }
        }
    </script>
</body>
</html>
