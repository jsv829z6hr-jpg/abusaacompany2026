<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>استفسار ذكي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #ffffff;
            font-family: 'Cairo', sans-serif;
            text-align: center;
            color: #000000;
            margin: 0;
            padding: 20px;
        }
        .logo {
            margin-top: 20px;
        }
        .logo img {
            width: 120px;
            height: auto;
        }
        h2 {
            color: #062174;
            font-size: 32px;
            margin: 20px 0;
        }
        textarea {
            width: 90%;
            max-width: 600px;
            height: 120px;
            font-size: 18px;
            margin: 20px auto;
            border-radius: 5px;
            padding: 10px;
            display: block;
        }
        button {
            background-color: #cf2626;
            color: #fff;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #062174;
        }
        #reply {
            margin-top: 30px;
            font-size: 20px;
            color: #062174;
        }

        /* تصغير النصوص والعناصر على الهواتف */
        @media (max-width: 600px) {
            .logo img {
                width: 80px;
            }
            h2 {
                font-size: 24px;
            }
            textarea {
                width: 100%;
                height: 100px;
                font-size: 16px;
            }
            button {
                width: 100%;
                font-size: 16px;
                padding: 10px;
            }
            #reply {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- شعار الشركة -->
    <div class="logo">
        <img src="images/hyundai-seeklogo.png" alt="شعار الشركة">
    </div>

    <h2>💡 استفسر عن الصنف المطلوب</h2>
    <textarea id="question" placeholder="اكتب استفسارك هنا..."></textarea><br>
    <button onclick="askAI()">إرسال</button>

    <div id="reply"></div>

    <script>
        async function askAI() {
            const question = document.getElementById("question").value;
            const replyDiv = document.getElementById("reply");

            try {
                const response = await fetch("https://api-inference.huggingface.co/models/google/flan-t5-base", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "" // ضع مفتاح API هنا إذا عندك
                    },
                    body: JSON.stringify({ inputs: question })
                });

                const data = await response.json();
                if (data.error) {
                    replyDiv.innerHTML = "❌ خطأ: " + data.error;
                } else {
                    replyDiv.innerHTML = "🔹 إجابة ذكية: " + (data[0]?.generated_text || "لم تصل إجابة");
                }
            } catch (err) {
                replyDiv.innerHTML = "⚠️ حدث خطأ أثناء الاتصال بالخدمة.";
            }
        }
    </script>
</body>
</html>
