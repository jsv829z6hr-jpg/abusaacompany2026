<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>موقع شركة ابوصاع</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">
    <style>
        body { 
            background: url("images/background.png") no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Cairo', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        h1 {
            color: #000000;
            font-size: 80px;
            margin-top: 60px;
        }
        p {
            color: #000000;
            font-size: 40px;
            line-height: 1.8;
        }
        .logos {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .logos img {
            max-width: 100%;
            width: 200px;
            height: auto;
            background-color: #ffffff;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .logos img:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px #ffffff;
        }

        /* تصغير النصوص والشعارات على الهواتف */
        @media (max-width: 600px) {
            h1 {
                font-size: 40px;
            }
            p {
                font-size: 20px;
            }
            .logos {
                flex-direction: column;
                gap: 20px;
            }
            .logos img {
                width: 150px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <h1>شركة ابوصاع المحدودة</h1>
    <p>لقطع غيار السيارات اليابانية والكورية</p>

    <div class="logos">
